---
name: Release

on:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      id-token: write
      attestations: write
    steps:
      - id: app
        name: Generate App Token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_KEY }}

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0 # bumpkin needs full history to find the previous release tag
          token: ${{ steps.app.outputs.token }}

      - id: bumpkin
        name: Resolve Version
        uses: goeselt/bumpkin@8e5d31105440aa42cd53d50b22c954be38bc2dd0 # v1.0.1
        with:
          initial-version: '1.0.0'

      - name: Set Up Node
        if: steps.bumpkin.outputs.release-needed == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Install Dependencies
        if: steps.bumpkin.outputs.release-needed == 'true'
        run: npm ci

      - name: Update
        if: steps.bumpkin.outputs.release-needed == 'true'
        run: npm run update

      - name: Typecheck
        if: steps.bumpkin.outputs.release-needed == 'true'
        run: npm run typecheck

      - name: Bump Version
        if: steps.bumpkin.outputs.release-needed == 'true'
        env:
          VERSION: ${{ steps.bumpkin.outputs.next-version }}
        run: npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Build
        if: steps.bumpkin.outputs.release-needed == 'true'
        run: npm run build

      - name: Package
        if: steps.bumpkin.outputs.release-needed == 'true'
        id: pkg
        env:
          VERSION: ${{ steps.bumpkin.outputs.next-version }}
        run: |
          npm run package
          printf 'vsix=octopass-%s.vsix\n' "$VERSION" >>"$GITHUB_OUTPUT"

      - name: Attest Build Provenance
        if: steps.bumpkin.outputs.release-needed == 'true'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: ${{ steps.pkg.outputs.vsix }}

      - name: Import Signing Key
        if: steps.bumpkin.outputs.release-needed == 'true'
        env:
          SIGNING_KEY: ${{ secrets.RELEASE_SIGNING_KEY }}
        run: echo "$SIGNING_KEY" | base64 -d | gpg --import --batch

      - name: Commit Version Bump
        if: steps.bumpkin.outputs.release-needed == 'true'
        env:
          VERSION: ${{ steps.bumpkin.outputs.next-version }}
          GIT_USER_NAME: ${{ vars.RELEASE_SIGNING_USER }}
          GIT_USER_EMAIL: ${{ vars.RELEASE_SIGNING_EMAIL }}
        run: |
          git config user.name "$GIT_USER_NAME"
          git config user.email "$GIT_USER_EMAIL"
          git config commit.gpgsign true
          git add package.json package-lock.json
          if ! git diff --staged --quiet; then
            git commit -m "chore(version): release v${VERSION} [skip ci]"
            git push
          fi

      - name: Ship
        if: steps.bumpkin.outputs.release-needed == 'true'
        uses: goeselt/shipit@8aad8bac87ba6757859e510db9d08bb49adb30fa # v1.0.1
        with:
          release-tag: ${{ steps.bumpkin.outputs.release-tag }}
          major-tag: ${{ steps.bumpkin.outputs.major-tag }}
          minor-tag: ${{ steps.bumpkin.outputs.minor-tag }}
          github-token: ${{ steps.app.outputs.token }}
          git-user-name: ${{ vars.RELEASE_SIGNING_USER }}
          git-user-email: ${{ vars.RELEASE_SIGNING_EMAIL }}
          signing-key: ${{ secrets.RELEASE_SIGNING_KEY }}
          assets: ${{ steps.pkg.outputs.vsix }}
